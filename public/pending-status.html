<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>投稿状态 - 网文评分站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="bg-slate-50 text-slate-800">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-3xl items-center justify-between px-4 py-3">
        <a href="/" class="text-xl font-bold text-indigo-900">网文评分站</a>
        <a href="/" class="rounded-lg border border-slate-200 px-3 py-2 text-sm hover:bg-slate-100">返回首页</a>
      </div>
    </header>
    <main class="mx-auto max-w-3xl px-4 py-6">
      <section class="rounded-xl border border-slate-200 bg-white p-5">
        <h1 class="text-2xl font-semibold text-slate-900">投稿已提交</h1>
        <p class="mt-2 text-sm text-slate-600">你的书籍信息已进入待审核列表，管理员审核通过后会展示在首页。</p>
        <div id="pendingInfo" class="mt-4 rounded-lg bg-slate-50 p-4 text-sm text-slate-700"></div>
        <form id="mySubmissionForm" class="mt-4 grid grid-cols-1 gap-2 md:grid-cols-[1fr_auto]">
          <input id="mySubmissionNickname" class="input-base" placeholder="输入提交人昵称，查询最近投稿记录" />
          <button class="rounded-lg bg-slate-800 px-4 py-2 text-white hover:bg-slate-700">查询最近10条</button>
        </form>
        <div id="mySubmissionList" class="mt-3 space-y-2"></div>
        <div class="mt-4 flex gap-2">
          <a href="/" class="rounded-lg bg-indigo-700 px-4 py-2 text-white hover:bg-indigo-600">继续浏览</a>
          <a href="/?openSubmit=1" class="rounded-lg bg-emerald-600 px-4 py-2 text-white hover:bg-emerald-500">继续添加新书</a>
          <button id="clearLocalRecordBtn" class="rounded-lg border border-slate-300 px-4 py-2 hover:bg-slate-100">清除本地记录</button>
        </div>
      </section>
    </main>
    <script src="/pending-status.js"></script>
  </body>
</html>
